[loggers]
keys=root,ssnbot

[handlers]
keys=consoleHandler

[formatters]
keys=Formatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_ssnbot]
level=INFO
handlers=consoleHandler
qualname=ssnbot
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=Formatter
args=(sys.stdout,)

[formatter_Formatter]
format=[%(asctime)s][%(name)s][%(module)s][%(lineno)d][%(levelname)s] -> %(message)s
datefmt=%d/%m/%Y %H:%M:%S
